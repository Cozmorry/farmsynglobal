# FarmSyn Global - Render Blueprint (PostgreSQL)
# New → Blueprint → connect repo. Set FRONTEND_URLS and VITE_API_BASE_URL in Dashboard.

databases:
  - name: farmsyn-db
    databaseName: farmsyn
    plan: free

services:
  # -----------------------------
  # Backend API (FastAPI)
  # -----------------------------
  - type: web
    runtime: python
    name: farmsyn-api

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: farmsyn-db
          property: connectionString
      - key: FRONTEND_URLS
        sync: false

  # -----------------------------
  # Frontend (React/Vite static)
  # -----------------------------
  - type: web
    runtime: static
    name: farmsyn-web

    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    envVars:
      - key: VITE_API_BASE_URL
        sync: false
